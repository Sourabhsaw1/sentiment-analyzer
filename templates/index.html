<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentiment Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #555570;
    --pos: #00e5a0;
    --neg: #ff4466;
    --neu: #ffcc00;
    --accent: #7c6aff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,106,255,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(0,229,160,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .wrap {
    width: 100%;
    max-width: 560px;
    animation: fadeUp 0.6s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .header { margin-bottom: 32px; }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
  }
  textarea {
    width: 100%;
    height: 140px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 14px 16px;
    resize: none;
    outline: none;
    transition: border 0.2s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  .btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 14px;
    letter-spacing: 0.5px;
    transition: transform 0.15s, opacity 0.15s;
  }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn:active { transform: scale(0.98); }
  .result { display: none; animation: fadeUp 0.4s ease; }
  .sentiment-label {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    text-align: center;
    margin-bottom: 20px;
    transition: color 0.3s;
  }
  .scores { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .score-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    text-align: center;
  }
  .score-val {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--accent);
  }
  .score-lbl { font-size: 0.8rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .bar-wrap { margin-top: 16px; }
  .bar-lbl { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
  .bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
    width: 0%;
  }
  .history { margin-top: 8px; }
  .history h3 { font-family: 'Syne', sans-serif; font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .hist-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 0.88rem;
    animation: fadeUp 0.3s ease;
  }
  .hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .hist-text { flex: 1; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-tag { font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Sentiment Analyzer</h1>
    <p>Detect emotion, polarity & subjectivity in any text</p>
  </div>

  <div class="card">
    <textarea id="txt" placeholder="Type anything — a review, a tweet, a thought..."></textarea>
    <button class="btn" onclick="analyze()">Analyze →</button>
  </div>

  <div class="card result" id="result">
    <div class="sentiment-label" id="slabel"></div>
    <div class="scores">
      <div class="score-box">
        <div class="score-val" id="pol"></div>
        <div class="score-lbl">Polarity</div>
      </div>
      <div class="score-box">
        <div class="score-val" id="sub"></div>
        <div class="score-lbl">Subjectivity</div>
      </div>
    </div>
    <div class="bar-wrap">
      <div class="bar-lbl"><span>Negative</span><span>Positive</span></div>
      <div class="bar-track"><div class="bar-fill" id="pbar"></div></div>
    </div>
    <div class="bar-wrap" style="margin-top:10px">
      <div class="bar-lbl"><span>Objective</span><span>Subjective</span></div>
      <div class="bar-track"><div class="bar-fill" id="sbar" style="background:var(--accent)"></div></div>
    </div>
  </div>

  <div class="card history" id="histCard" style="display:none">
    <h3>History</h3>
    <div id="histList"></div>
  </div>
</div>

<script>
  const history = [];

  async function analyze() {
    const text = document.getElementById('txt').value.trim();
    if (!text) return;

    const res = await fetch('/analyze', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({text})
    });
    const d = await res.json();

    const isPos = d.polarity > 0, isNeg = d.polarity < 0;
    const color = isPos ? 'var(--pos)' : isNeg ? 'var(--neg)' : 'var(--neu)';

    document.getElementById('slabel').textContent = d.sentiment;
    document.getElementById('slabel').style.color = color;
    document.getElementById('pol').textContent = d.polarity;
    document.getElementById('sub').textContent = d.subjectivity;

    document.getElementById('result').style.display = 'block';

    setTimeout(() => {
      document.getElementById('pbar').style.width = ((d.polarity + 1) / 2 * 100) + '%';
      document.getElementById('pbar').style.background = color;
      document.getElementById('sbar').style.width = (d.subjectivity * 100) + '%';
    }, 50);

    history.unshift({text: text.substring(0,50), sentiment: d.sentiment, color});
    if (history.length > 5) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('histList');
    document.getElementById('histCard').style.display = 'block';
    list.innerHTML = history.map(h => `
      <div class="hist-item">
        <div class="hist-dot" style="background:${h.color}"></div>
        <div class="hist-text">${h.text}${h.text.length >= 50 ? '...' : ''}</div>
        <div class="hist-tag" style="color:${h.color}">${h.sentiment.split(' ')[0]}</div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
